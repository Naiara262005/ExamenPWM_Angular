<div class="container mt-4">
  <div class="row">

    <div class="col-md-6">
      <h3 class="mb-4">Gestión de Empleados</h3>

      <form [formGroup]="miFormulario" (ngSubmit)="guardar()">

        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" formControlName="name" class="form-control">

          <small class="text-danger" *ngIf="miFormulario.get('name')?.invalid && miFormulario.get('name')?.touched">
            Este campo es obligatorio.
          </small>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo Electronico</label>
          <input type="mail" formControlName="email" class="form-control">

          <small class="text-danger" *ngIf="miFormulario.get('email')?.invalid && miFormulario.get('email')?.touched">
            Este campo es obligatorio.
          </small>
        </div>

        <button type="submit" [disabled]="miFormulario.invalid" class="btn btn-primary">
          {{ idEnEdicion ? 'Actualizar' : 'Agregar' }}
        </button>
        <button type="button" (click)="limpiar()" class="btn btn-secondary ms-2">Limpiar</button>
      </form>
    </div>

    <div class="col-md-6">
      <h3 class="mb-4">Lista de Empleados</h3>

      <ul class="list-group">
        <li *ngFor="let item of listaDatos" class="list-group-item d-flex justify-content-between align-items-center">

          <span>{{ item.name }}</span>

          <div>
            <button class="btn btn-warning btn-sm me-2" (click)="editar(item)">Editar</button>
            <button class="btn btn-danger btn-sm" (click)="eliminar(item.id)">Borrar</button>
          </div>
        </li>
      </ul>
    </div>

  </div>
</div>
